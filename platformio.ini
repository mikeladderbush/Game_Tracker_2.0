; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_matrixportal_esp32s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino

lib_deps = 
    adafruit/Adafruit Protomatter
    bblanchon/ArduinoJson

monitor_port = COM8
monitor_speed = 115200

; Host-native unit tests - no board needed, runs on your dev machine.
; Only pure-logic files are compiled. Excluded: main.cpp (setup/loop +
; WiFi/FreeRTOS), display.cpp/draw_tools.cpp (Adafruit_Protomatter),
; control_server.cpp (WebServer.h), and api_client.cpp/game_state.cpp
; (WiFiClientSecure/HTTPClient/ArduinoJson/configTzTime - ESP32-only, no
; native equivalent). Their pure logic lives in api_formatting.cpp and
; clock_sync.cpp instead, which ARE compiled here.
[env:native]
platform = native
test_framework = unity
; PlatformIO doesn't link src/ into test binaries by default (it assumes
; main.cpp would conflict with the test's own main()) - since main.cpp is
; excluded below anyway, turn this on so the pure-logic .cpp files actually
; get compiled and linked into each test.
test_build_src = yes
build_src_filter =
    +<*>
    -<main.cpp>
    -<display.cpp>
    -<draw_tools.cpp>
    -<control_server.cpp>
    -<api_client.cpp>
    -<game_state.cpp>
lib_deps =
    fabiobatsilva/ArduinoFake@^0.4.0
build_flags =
    -std=gnu++17
    -DUNIT_TEST